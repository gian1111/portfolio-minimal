<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetto</title>
    <script>
        const savedTitle = sessionStorage.getItem('projectTitle');
        if (savedTitle) {
            document.title = savedTitle;
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Shader Canvas -->
    <canvas id="shaderCanvas"></canvas>
    
    <div class="container">
        <!-- Back Button -->
        <div class="back-button">
            <a href="index.html" class="back-link">← Back</a>
        </div>

        <!-- Project Header -->
        <header class="project-header">
            <h1 class="project-page-title" id="projectTitle">Titolo Progetto</h1>
            <p class="project-page-date" id="projectDate">2026</p>
        </header>

        <!-- Overview (above all content) -->
        <section class="project-section">
            <h2 class="section-title">Overview</h2>
            <p class="project-full-description" id="projectDescription">
                Descrizione del progetto
            </p>
        </section>

        <!-- Project Gallery -->
        <section class="project-section">
            <h2 class="section-title">Gallery</h2>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Contenuti caricati dinamicamente -->
            </div>
        </section>

        <!-- Project Content -->
        <article class="project-content">
            <!-- Extra text blocks (above Details) -->
            <section class="project-section" id="projectBlocksSection" style="display: none;">
                <h2 class="section-title">More</h2>
                <div class="project-blocks" id="projectBlocks"></div>
            </section>

            <section class="project-section">
                <h2 class="section-title">Details</h2>
                <div class="project-details" id="projectDetails">
                    <!-- Dettagli caricati dinamicamente -->
                </div>
            </section>

            <section class="project-section">
                <h2 class="section-title">Tags</h2>
                <div class="project-tags" id="projectTags">
                    <!-- Tags caricati dinamicamente -->
                </div>
            </section>
        </article>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">© 2026. Made with minimal aesthetic.</p>
        </footer>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="lightbox-modal">
        <button class="lightbox-close">&times;</button>
        <div class="lightbox-container">
            <img id="lightboxImage" src="" alt="Gallery image" class="lightbox-image">
        </div>
        <button class="lightbox-prev">&#8249;</button>
        <button class="lightbox-next">&#8250;</button>
        <div class="lightbox-counter">
            <span id="lightboxCounter"></span>
        </div>
    </div>

    <script src="shader.js"></script>
    <script src="projects-data.js"></script>
    <script src="project-script.js"></script>
</body>
</html>
